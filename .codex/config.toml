[agents]
# Keep close to the documented Codex default (6) while allowing modest repo fan-out.
max_threads = 8
max_depth = 1

# Project-scoped registry entries are supported by Codex config reference via
# agents.<name>.config_file; standalone files below remain the authored layer.
[agents."api-agent"]
config_file = "agents/api-agent.toml"

[agents."architecture-agent"]
config_file = "agents/architecture-agent.toml"

[agents."concurrency-agent"]
config_file = "agents/concurrency-agent.toml"

[agents."challenger-agent"]
config_file = "agents/challenger-agent.toml"

[agents."data-agent"]
config_file = "agents/data-agent.toml"

[agents."delivery-agent"]
config_file = "agents/delivery-agent.toml"

[agents."design-integrator-agent"]
config_file = "agents/design-integrator-agent.toml"

[agents."distributed-agent"]
config_file = "agents/distributed-agent.toml"

[agents."domain-agent"]
config_file = "agents/domain-agent.toml"

[agents."observability-agent"]
config_file = "agents/observability-agent.toml"

[agents."performance-agent"]
config_file = "agents/performance-agent.toml"

[agents."qa-agent"]
config_file = "agents/qa-agent.toml"

[agents."quality-agent"]
config_file = "agents/quality-agent.toml"

