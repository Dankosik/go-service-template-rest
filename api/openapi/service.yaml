openapi: 3.0.3
info:
  title: go-service-template-rest
  version: 0.1.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: https://api.your-service.tld
    description: placeholder production base URL
security: []
tags:
  - name: system
    description: Operational endpoints for liveness, readiness, and metrics.
  - name: app
    description: Application endpoints.
paths:
  /api/v1/ping:
    get:
      tags: [app]
      summary: Ping endpoint
      operationId: ping
      x-security-decision:
        exposure: public
        rationale: sample endpoint for template smoke checks
      responses:
        "200":
          description: pong
          content:
            text/plain:
              schema:
                type: string
                example: pong
        "400":
          $ref: "#/components/responses/BadRequest"
        "413":
          $ref: "#/components/responses/RequestEntityTooLarge"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /health/live:
    get:
      tags: [system]
      summary: Liveness probe
      operationId: healthLive
      x-security-decision:
        exposure: public
        rationale: process-only platform liveness endpoint with no dependency details
      responses:
        "200":
          description: ok
          content:
            text/plain:
              schema:
                type: string
                example: ok
        "400":
          $ref: "#/components/responses/BadRequest"
        "413":
          $ref: "#/components/responses/RequestEntityTooLarge"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /health/ready:
    get:
      tags: [system]
      summary: Readiness probe
      operationId: healthReady
      x-security-decision:
        exposure: public
        rationale: platform readiness endpoint exposing only generic ready state
      responses:
        "200":
          description: ready
          content:
            text/plain:
              schema:
                type: string
                example: ok
        "400":
          $ref: "#/components/responses/BadRequest"
        "413":
          $ref: "#/components/responses/RequestEntityTooLarge"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          description: not ready
          content:
            text/plain:
              schema:
                type: string
                example: not ready
  /metrics:
    get:
      tags: [system]
      summary: Prometheus metrics
      operationId: metrics
      x-security-decision:
        exposure: operational-private-required
        rationale: operational telemetry requires private scrape path, internal listener, or future real auth before internet exposure
      responses:
        "200":
          description: metrics output
          content:
            text/plain:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "413":
          $ref: "#/components/responses/RequestEntityTooLarge"
        "500":
          $ref: "#/components/responses/InternalServerError"
components:
  schemas:
    Problem:
      type: object
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          example: about:blank
        title:
          type: string
          example: bad request
        status:
          type: integer
          format: int32
          example: 400
        detail:
          type: string
          example: invalid request framing
        request_id:
          type: string
          example: 9ccecdfd92c94665a46406f8ba73cd77
  responses:
    BadRequest:
      description: request is malformed or invalid
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    RequestEntityTooLarge:
      description: request body exceeds configured limit
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    InternalServerError:
      description: unexpected server failure
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
