name: cd

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
  push:
    tags:
      - "v*"

concurrency:
  group: cd-${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  GOFLAGS: -mod=readonly
  GOLANGCI_LINT_VERSION: v2.10.1
  TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db:2
  COVERAGE_MIN: "65.0"

jobs:
  publish-main:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Prepare image metadata
        id: meta
        run: |
          IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY,,}"
          SHORT_SHA="$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-12)"

          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"
          echo "tag_main=main" >> "$GITHUB_OUTPUT"
          echo "tag_sha=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "primary_image=${IMAGE_REPO}:main" >> "$GITHUB_OUTPUT"
          echo "artifact_name=sbom-main-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image
        run: |
          docker build \
            -f build/docker/Dockerfile \
            -t "${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.tag_main }}" \
            -t "${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.tag_sha }}" \
            .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.34.2
        with:
          image-ref: ${{ steps.meta.outputs.primary_image }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.34.2
        with:
          image-ref: ${{ steps.meta.outputs.primary_image }}
          format: cyclonedx
          output: sbom.cdx.json

      - name: Push image tags
        run: |
          docker push "${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.tag_main }}"
          docker push "${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.tag_sha }}"

      - name: Resolve pushed digest
        id: digest
        run: |
          DIGEST="$(docker image inspect "${{ steps.meta.outputs.primary_image }}" --format '{{index .RepoDigests 0}}' | cut -d'@' -f2)"
          test -n "${DIGEST}"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.x"
          cache: true

      - name: Install cosign
        run: go install github.com/sigstore/cosign/v2/cmd/cosign@v2.6.2

      - name: Sign container image (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          "$(go env GOPATH)/bin/cosign" sign "${{ steps.meta.outputs.image_repo }}@${{ steps.digest.outputs.digest }}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ steps.meta.outputs.image_repo }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: sbom.cdx.json
          if-no-files-found: error

  release-preflight:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20.20.0"

      - name: Verify module integrity
        run: make mod-check

      - name: Verify required repository guardrails
        run: make guardrails-check

      - name: Verify agent mirror drift
        run: make agents-check

      - name: Verify skill mirror drift
        run: make skills-check

      - name: Verify formatting drift
        run: make fmt-check

      - name: Verify sqlc generation drift
        run: make sqlc-check

      - name: Verify mock generation drift
        run: make mocks-drift-check

      - name: Verify stringer generation drift
        run: make stringer-drift-check

      - name: Lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=3m

      - name: Unit tests
        run: make test

      - name: Go vet
        run: make vet

      - name: Coverage + JUnit + JSON
        run: make test-report COVERAGE_MIN=${{ env.COVERAGE_MIN }}

      - name: Race detector
        run: make test-race

      - name: Integration tests
        run: REQUIRE_DOCKER=1 make test-integration

      - name: Migration validation
        run: make migration-validate

      - name: OpenAPI contract checks
        run: make openapi-check

      - name: Run Go security checks
        run: make go-security

      - name: Secret scan
        run: make secret-scan

  publish-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: release-preflight
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare image metadata
        id: meta
        run: |
          IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY,,}"
          VERSION_TAG="${GITHUB_REF_NAME}"
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-12)"

          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"
          echo "tag_version=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "tag_latest=latest" >> "$GITHUB_OUTPUT"
          echo "tag_sha=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "primary_image=${IMAGE_REPO}:${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=sbom-${VERSION_TAG}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image
        run: |
          docker build \
            -f build/docker/Dockerfile \
            -t "${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.tag_version }}" \
            -t "${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.tag_latest }}" \
            -t "${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.tag_sha }}" \
            .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.34.2
        with:
          image-ref: ${{ steps.meta.outputs.primary_image }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.34.2
        with:
          image-ref: ${{ steps.meta.outputs.primary_image }}
          format: cyclonedx
          output: sbom.cdx.json

      - name: Push image tags
        run: |
          docker push "${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.tag_version }}"
          docker push "${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.tag_latest }}"
          docker push "${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.tag_sha }}"

      - name: Resolve pushed digest
        id: digest
        run: |
          DIGEST="$(docker image inspect "${{ steps.meta.outputs.primary_image }}" --format '{{index .RepoDigests 0}}' | cut -d'@' -f2)"
          test -n "${DIGEST}"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.x"
          cache: true

      - name: Install cosign
        run: go install github.com/sigstore/cosign/v2/cmd/cosign@v2.6.2

      - name: Sign container image (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          "$(go env GOPATH)/bin/cosign" sign "${{ steps.meta.outputs.image_repo }}@${{ steps.digest.outputs.digest }}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ steps.meta.outputs.image_repo }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: sbom.cdx.json
          if-no-files-found: error
