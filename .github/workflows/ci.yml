name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GOFLAGS: -mod=readonly
  GOLANGCI_LINT_VERSION: v2.10.1
  GOVULNCHECK_VERSION: v1.1.4
  GOSEC_VERSION: v2.24.7
  COVERAGE_MIN: "65.0"

jobs:
  repo-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify module integrity
        run: make mod-check

      - name: Verify required repository guardrails
        run: make guardrails-check

      - name: Verify skills mirrors are in sync
        run: make skills-check

      - name: Verify formatting drift
        run: make fmt-check

      - name: Verify sqlc generation drift
        run: make sqlc-check

      - name: Verify docs drift policy
        run: |
          case "${{ github.event_name }}" in
            pull_request)
              BASE_REF="${{ github.event.pull_request.base.sha }}"
              ;;
            push)
              BASE_REF="${{ github.event.before }}"
              ;;
            *)
              echo "event does not provide stable base ref, skipping docs drift check"
              exit 0
              ;;
          esac

          if [ -z "${BASE_REF}" ] || [ "${BASE_REF}" = "0000000000000000000000000000000000000000" ]; then
            echo "base ref is unavailable, skipping docs drift check"
            exit 0
          fi

          make docs-drift-check BASE_REF="${BASE_REF}" HEAD_REF="${{ github.sha }}"

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: repo-integrity
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          install-only: true

      - name: Verify golangci-lint config (15s schema timeout)
        run: |
          SCHEMA_VERSION="$(echo "${GOLANGCI_LINT_VERSION#v}" | cut -d. -f1,2)"
          SCHEMA_URL="https://golangci-lint.run/jsonschema/golangci.v${SCHEMA_VERSION}.jsonschema.json"
          SCHEMA_FILE="$(mktemp)"

          curl \
            --fail \
            --show-error \
            --location \
            --retry 3 \
            --retry-all-errors \
            --retry-delay 2 \
            --connect-timeout 15 \
            --max-time 15 \
            "${SCHEMA_URL}" \
            --output "${SCHEMA_FILE}"

          golangci-lint config verify --schema "${SCHEMA_FILE}"

      - name: Lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          install-mode: none
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          verify: false
          args: --timeout=3m

  openapi-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: repo-integrity
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "20.20.0"

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate OpenAPI Go bindings
        run: make openapi-generate

      - name: Detect OpenAPI codegen drift
        run: make openapi-drift-check

      - name: Compile generated OpenAPI package
        run: go test ./internal/api

      - name: Verify OpenAPI runtime contract
        run: make openapi-runtime-contract-check

      - name: Validate OpenAPI schema
        run: make openapi-validate

      - name: Lint OpenAPI rules
        run: make openapi-lint

  openapi-breaking:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - repo-integrity
      - openapi-contract
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Extract base OpenAPI spec
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if git show "${BASE_SHA}:api/openapi/service.yaml" > /tmp/openapi-base.yaml 2>/dev/null; then
            echo "BASE_SPEC_FOUND=true" >> "$GITHUB_ENV"
          else
            echo "BASE_SPEC_FOUND=false" >> "$GITHUB_ENV"
            echo "No base OpenAPI spec found in base commit. Skipping breaking-change check."
          fi

      - name: Check OpenAPI breaking changes
        if: env.BASE_SPEC_FOUND == 'true'
        run: BASE_OPENAPI=/tmp/openapi-base.yaml make openapi-breaking

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: repo-integrity
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Unit tests
        run: make test

  test-race:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: repo-integrity
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Race detector
        run: make test-race

  test-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: repo-integrity
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Coverage + JUnit + JSON
        run: make test-report COVERAGE_MIN=${{ env.COVERAGE_MIN }}

      - name: Upload coverage report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-report
          path: coverage.out
          if-no-files-found: error

      - name: Upload test report artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-report-artifacts
          path: |
            .artifacts/test/junit.xml
            .artifacts/test/test2json.json
          if-no-files-found: error

  test-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: repo-integrity
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Integration tests
        run: REQUIRE_DOCKER=1 make test-integration

  migration-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: repo-integrity
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: app
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect migration changes
        id: migration_changes
        run: |
          case "${{ github.event_name }}" in
            pull_request)
              BASE_REF="${{ github.event.pull_request.base.sha }}"
              ;;
            push)
              BASE_REF="${{ github.event.before }}"
              ;;
            *)
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          if [ -z "${BASE_REF}" ] || [ "${BASE_REF}" = "0000000000000000000000000000000000000000" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only "${BASE_REF}" "${{ github.sha }}" | grep -Eq '^env/migrations/'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go
        if: steps.migration_changes.outputs.should_run == 'true'
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate migrations on ephemeral Postgres
        if: steps.migration_changes.outputs.should_run == 'true'
        run: |
          make migration-validate \
            MIGRATION_DSN='postgres://app:app@localhost:5432/app?sslmode=disable'

      - name: Skip migration validation
        if: steps.migration_changes.outputs.should_run != 'true'
        run: echo "no migration files changed"

  go-security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: repo-integrity
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@${{ env.GOSEC_VERSION }}
          "$(go env GOPATH)/bin/gosec" -exclude-generated ./...

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: repo-integrity
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run gitleaks
        run: make secrets-scan

  container-security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: repo-integrity
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build container image
        run: docker build -f build/docker/Dockerfile -t service:ci .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # 0.34.2
        with:
          image-ref: service:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
