version: "2"

run:
  timeout: 3m

linters:
  default: standard
  enable:
    - govet
    - staticcheck
    - errcheck
    - bodyclose
    - sqlclosecheck
    - errorlint
    - contextcheck
    - gocritic
    - nilerr
    - nilnil
    - nolintlint
    - predeclared
    - thelper
    - unconvert
    - wastedassign
